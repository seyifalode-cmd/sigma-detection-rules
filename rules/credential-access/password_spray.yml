title: Password Spray Attack
id: b2c3d4e5-0002-4b2b-9f02-bb2222222222
status: experimental
description: >
  Detects a password spray attack where a single source attempts authentication
  against many different user accounts with a low number of failures per account,
  evading lockout policies. A large number of distinct TargetUserName values with
  failed logons from the same source IP within a short window is indicative.
author: Oluwaseyi Michael Falode
date: 2026/06/05
references:
    - https://attack.mitre.org/techniques/T1110/003/
tags:
    - attack.credential_access
    - attack.t1110.003
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4625
    timeframe: 10m
    condition: selection | count(TargetUserName) by IpAddress > 20
falsepositives:
    - Vulnerability scanners or penetration testing tools
    - Automated provisioning scripts authenticating to multiple accounts
    - Misconfigured load balancers sharing a single source IP
level: high
